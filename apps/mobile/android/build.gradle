// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
        classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  // Windows MAX_PATH (260) workaround: the deep pnpm node_modules build/.transforms
  // paths blow past the limit during mergeDexRelease. Redirect every subproject's
  // build dir to a short root so transform paths stay well under 260 chars.
  if (project != rootProject) {
    layout.buildDirectory.set(new File("E:/tb/" + project.name))
  }
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

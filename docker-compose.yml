# Tamem Delivery — Local Development Services
# Run with: docker compose up -d
# Stop with: docker compose down
# Reset DB: docker compose down -v && docker compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: tamem-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tamem
      MYSQL_USER: tamem
      MYSQL_PASSWORD: tamempass
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    ports:
      - '3306:3306'
    volumes:
      - tamem_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'tamem', '-ptamempass']
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin (اختياري - GUI للتطوير المحلي)
  # شغّل بـ: docker compose --profile tools up -d
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tamem-pma
    restart: unless-stopped
    profiles: [tools]
    environment:
      PMA_HOST: mysql
      PMA_USER: tamem
      PMA_PASSWORD: tamempass
    ports:
      - '8080:80'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  tamem_mysql_data:

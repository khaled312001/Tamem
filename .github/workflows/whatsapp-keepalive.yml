name: WhatsApp bridge keepalive

# Keeps the WhatsApp (Baileys) bridge alive with ZERO paid server subscription.
#
# Why this exists: the production host is Hostinger shared hosting. PHP cannot
# spawn processes (exec/shell_exec/proc_open are all in disable_functions) and
# there is no crontab CLI, so nothing on the server can autonomously restart a
# long-running Node process — and the host periodically reaps background
# processes. Recovery therefore has to be driven from OUTSIDE the box.
#
# Two layers keep the service up:
#   Layer 1 (on the server): run-forever.sh supervises the node bridge in a
#           restart loop, so a crash / WhatsApp drop / node reap recovers in a
#           few seconds on its own.
#   Layer 2 (this workflow): a free scheduled Action SSHes in every few minutes
#           and runs keepalive.sh, which relaunches the SUPERVISOR itself if the
#           host reaped it. GitHub Actions is free and unlimited on public repos.
#
# GitHub only schedules cron on a best-effort basis (a "*/5" job can be delayed
# 10-30 min under load), but that is fine: Layer 1 handles the frequent, fast
# failures; this workflow only has to catch the rare full-supervisor reap.
#
# One-time setup — add these repository secrets (Settings → Secrets and
# variables → Actions):
#   HOSTINGER_SSH_HOST  (e.g. 77.37.37.207)
#   HOSTINGER_SSH_PORT  (e.g. 65002)
#   HOSTINGER_SSH_USER  (e.g. u748721963)
#   HOSTINGER_SSH_PASS  (the SSH password)
# You can also trigger it manually from the Actions tab (Run workflow).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# If a run is still going when the next fires, skip rather than pile up.
concurrency:
  group: whatsapp-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      # One cron fire covers the WHOLE 5-minute gap to the next: it SSHes in once
      # and loops keepalive every 30s for ~5 min. So a reaped supervisor is
      # revived within ~30s instead of up to the full 5-minute cron interval —
      # the difference between "WhatsApp blips for 30s" and "for 5 minutes".
      # Consecutive cron fires overlap-safe via the concurrency group above.
      - name: Keep the bridge supervisor running (30s loop for ~5 min)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          command_timeout: 6m
          script: |
            for i in $(seq 1 10); do
              bash /home/u748721963/whatsapp/keepalive.sh
              sleep 30
            done
